# Nixpacks configuration for docmcp HTTP Server
# This configuration ensures the app runs properly on Coolify and other Nixpacks-compatible platforms

[phases.setup]
nixPkgs = ['...', 'nodejs']
cmds = ['npm install']

[phases.build]
cmds = []

[phases.start]
cmd = 'node http-server.js --port 3000 --host 0.0.0.0'
ports = ['3000:3000']
dependsOn = ['build']

# Required environment variables (set in Coolify):
# GOOGLE_OAUTH_CLIENT_ID - Google OAuth client ID
# GOOGLE_OAUTH_CLIENT_SECRET - Google OAuth client secret
#
# Optional environment variables (auto-detected if not set):
# REDIRECT_URI - OAuth redirect URI (auto-detected from COOLIFY_FQDN)
# CORS_ORIGIN - CORS origin (auto-detected from COOLIFY_FQDN)
#
# Auto-detection priority:
# 1. Explicit environment variable (if set)
# 2. COOLIFY_URL (provided by Coolify)
# 3. COOLIFY_FQDN (provided by Coolify)
# 4. Default construction from host:port
#
# For docmcp.acc.l-inc.co.za, the following will be auto-detected:
# REDIRECT_URI = https://docmcp.acc.l-inc.co.za/auth/callback
# CORS_ORIGIN = https://docmcp.acc.l-inc.co.za