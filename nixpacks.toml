# Nixpacks configuration for docmcp HTTP Server
# This configuration ensures the app runs properly on Coolify and other Nixpacks-compatible platforms

[phases.setup]
nixPkgs = ['...', 'nodejs']
cmds = ['npm install']

[phases.build]
cmds = []

[phases.start]
cmd = 'node http-server.js --port 3000 --host 0.0.0.0'
ports = ['3000:3000']
dependsOn = ['build']

# Environment variables are required for OAuth
# Set these in your Coolify deployment:
# GOOGLE_OAUTH_CLIENT_ID - Google OAuth client ID
# GOOGLE_OAUTH_CLIENT_SECRET - Google OAuth client secret
# REDIRECT_URI - OAuth redirect URI (e.g., https://your-domain.com/auth/callback)
# CORS_ORIGIN - CORS origin (e.g., https://your-domain.com)